@if (submitted()) {
  <app-auth-form-card
    title="Check your inbox"
    subtitle="If an account exists for that email, password reset instructions are on the way."
  >
    <app-success-state
      title="Reset email sent"
      description="Follow the secure link in your email to choose a new password. The link expires shortly for your protection."
    />

    <a class="auth-inline-link" [routerLink]="['/', appRoutes.authentication, authRoutes.login]">
      Return to sign in
    </a>
  </app-auth-form-card>
} @else {
  <app-auth-form-card
    eyebrow="Account recovery"
    title="Reset your password"
    subtitle="Enter the email associated with your MyPropertyAsset account and we will send reset instructions."
  >
    <app-validation-summary [issues]="validationIssues()" />

    @if (submitError()) {
      <div class="auth-alert" role="alert">{{ submitError() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-auth-form-field
        label="Work email"
        inputId="forgot-email"
        type="email"
        placeholder="name@company.com"
        autocomplete="email"
        [control]="form.controls.email"
      />

      <app-form-actions>
        <app-button
          label="Send reset link"
          type="submit"
          icon="envelope"
          [loading]="submitting()"
          [disabled]="submitting()"
        />
      </app-form-actions>
    </form>

    <a class="auth-inline-link" [routerLink]="['/', appRoutes.authentication, authRoutes.login]">
      Back to sign in
    </a>
  </app-auth-form-card>
}

<style>
  .auth-inline-link {
    display: inline-flex;
    margin-top: var(--mpa-spacing-md);
    font-size: var(--mpa-font-size-sm);
    font-weight: var(--mpa-font-weight-medium);
    color: var(--mpa-color-primary);
    text-decoration: none;
  }

  .auth-inline-link:hover {
    text-decoration: underline;
  }

  .auth-alert {
    padding: var(--mpa-spacing-md);
    border-radius: var(--mpa-radius-md);
    border: 1px solid color-mix(in srgb, var(--mpa-color-danger) 30%, transparent);
    background: color-mix(in srgb, var(--mpa-color-danger) 8%, var(--mpa-color-surface));
    color: var(--mpa-color-danger);
    font-size: var(--mpa-font-size-sm);
  }
</style>
