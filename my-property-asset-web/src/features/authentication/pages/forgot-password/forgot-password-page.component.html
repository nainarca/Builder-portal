<app-auth-page>
  @if (submitted()) {
    <app-auth-form-card
      title="Check your inbox"
      subtitle="If an account exists for that email, password reset instructions are on the way."
      [showTrustFooter]="false"
    >
      <app-success-state
        title="Reset email sent"
        description="Follow the secure link in your email to choose a new password. The link expires shortly for your protection."
      />

      <a class="auth-inline-link" [routerLink]="['/', appRoutes.authentication, authRoutes.login]">
        Return to sign in
      </a>
    </app-auth-form-card>
  } @else {
    <app-auth-form-card
      eyebrow="Account recovery"
      title="Reset your password"
      subtitle="Enter the email associated with your MyPropertyAsset account and we will send reset instructions."
    >
      <app-enterprise-validation-summary [issues]="validationIssues()" />

      @if (submitError()) {
        <app-error-alert [message]="submitError()!" />
      }

      <app-enterprise-form-layout width="narrow">
        <form class="auth-form-stack" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <app-auth-form-field
            label="Work email"
            inputId="forgot-email"
            type="email"
            placeholder="name@company.com"
            autocomplete="email"
            [control]="form.controls.email"
          />

          <app-form-actions>
            <app-button
              label="Send reset link"
              type="submit"
              icon="envelope"
              [loading]="submitting()"
              [disabled]="submitting()"
            />
          </app-form-actions>
        </form>
      </app-enterprise-form-layout>

      <a class="auth-inline-link" [routerLink]="['/', appRoutes.authentication, authRoutes.login]">
        Back to sign in
      </a>
    </app-auth-form-card>
  }
</app-auth-page>
