@if (completed()) {
  <app-auth-form-card title="Password updated" subtitle="Your credentials have been refreshed securely.">
    <app-success-state
      title="You're all set"
      description="Redirecting you to sign in with your new password."
    />
  </app-auth-form-card>
} @else {
  <app-auth-form-card
    eyebrow="Secure recovery"
    title="Choose a new password"
    subtitle="Create a strong password to protect your MyPropertyAsset workspace."
  >
    <app-validation-summary [issues]="validationIssues()" />

    @if (submitError()) {
      <div class="auth-alert" role="alert">{{ submitError() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-auth-password-field
        label="New password"
        inputId="reset-password"
        placeholder="Create a new password"
        autocomplete="new-password"
        [control]="form.controls.password"
      />

      <app-auth-password-field
        label="Confirm password"
        inputId="reset-password-confirm"
        placeholder="Re-enter your new password"
        autocomplete="new-password"
        [control]="form.controls.confirmPassword"
      />

      <app-form-actions>
        <app-button
          label="Update password"
          type="submit"
          icon="lock"
          [loading]="submitting()"
          [disabled]="submitting()"
        />
      </app-form-actions>
    </form>

    <a class="auth-inline-link" [routerLink]="['/', appRoutes.authentication, authRoutes.login]">
      Back to sign in
    </a>
  </app-auth-form-card>
}

<style>
  .auth-inline-link {
    display: inline-flex;
    margin-top: var(--mpa-spacing-md);
    font-size: var(--mpa-font-size-sm);
    font-weight: var(--mpa-font-weight-medium);
    color: var(--mpa-color-primary);
    text-decoration: none;
  }

  .auth-inline-link:hover {
    text-decoration: underline;
  }

  .auth-alert {
    padding: var(--mpa-spacing-md);
    border-radius: var(--mpa-radius-md);
    border: 1px solid color-mix(in srgb, var(--mpa-color-danger) 30%, transparent);
    background: color-mix(in srgb, var(--mpa-color-danger) 8%, var(--mpa-color-surface));
    color: var(--mpa-color-danger);
    font-size: var(--mpa-font-size-sm);
  }
</style>
