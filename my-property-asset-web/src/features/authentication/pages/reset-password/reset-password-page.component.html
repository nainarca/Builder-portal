<app-auth-page>
  @if (completed()) {
    <app-auth-form-card title="Password updated" subtitle="Your credentials have been refreshed securely." [showTrustFooter]="false">
      <app-success-state
        title="You're all set"
        description="Redirecting you to sign in with your new password."
      />
    </app-auth-form-card>
  } @else {
    <app-auth-form-card
      eyebrow="Secure recovery"
      title="Choose a new password"
      subtitle="Create a strong password to protect your MyPropertyAsset workspace."
    >
      <app-enterprise-validation-summary [issues]="validationIssues()" />

      @if (submitError()) {
        <app-error-alert [message]="submitError()!" />
      }

      <app-enterprise-form-layout width="narrow">
        <form class="auth-form-stack" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <app-auth-password-field
            label="New password"
            inputId="reset-password"
            placeholder="Create a new password"
            autocomplete="new-password"
            [control]="form.controls.password"
          />

          <app-auth-password-field
            label="Confirm password"
            inputId="reset-password-confirm"
            placeholder="Re-enter your new password"
            autocomplete="new-password"
            [control]="form.controls.confirmPassword"
          />

          <app-form-actions>
            <app-button
              label="Update password"
              type="submit"
              icon="lock"
              [loading]="submitting()"
              [disabled]="submitting()"
            />
          </app-form-actions>
        </form>
      </app-enterprise-form-layout>

      <a class="auth-inline-link" [routerLink]="['/', appRoutes.authentication, authRoutes.login]">
        Back to sign in
      </a>
    </app-auth-form-card>
  }
</app-auth-page>
