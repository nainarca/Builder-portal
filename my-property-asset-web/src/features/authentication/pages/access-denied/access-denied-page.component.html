<app-auth-page>
  <app-auth-form-card title="Access denied" [subtitle]="subtitle()" [showTrustFooter]="false">
    <app-error-state
      title="Insufficient access"
      [description]="description()"
      actionLabel="Return to sign in"
      (action)="goToLogin()"
    />
  </app-auth-form-card>
</app-auth-page>
