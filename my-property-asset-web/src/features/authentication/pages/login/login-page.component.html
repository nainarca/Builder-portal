<app-auth-form-card
  eyebrow="Welcome back"
  title="Sign in to MyPropertyAsset"
  subtitle="Access your portfolio, projects, and operational insights in one secure workspace."
>
  <app-validation-summary [issues]="validationIssues()" />

  @if (submitError()) {
    <div class="login-page__alert" role="alert">
      {{ submitError() }}
    </div>
  }

  <form class="login-page__form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <app-auth-form-field
      label="Work email"
      inputId="login-email"
      type="email"
      placeholder="name@company.com"
      autocomplete="email"
      [control]="form.controls.email"
    />

    <app-auth-password-field
      inputId="login-password"
      placeholder="Enter your password"
      autocomplete="current-password"
      [control]="form.controls.password"
    />

    <div class="login-page__meta">
      <app-auth-remember-me [control]="form.controls.rememberMe" />
      <a
        class="login-page__link"
        [routerLink]="['/', appRoutes.authentication, authRoutes.forgotPassword]"
      >
        Forgot password?
      </a>
    </div>

    <app-form-actions>
      <app-button
        label="Sign in"
        type="submit"
        icon="sign-in"
        [loading]="submitting()"
        [disabled]="submitting()"
      />
    </app-form-actions>
  </form>
</app-auth-form-card>
