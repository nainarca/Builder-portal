<app-auth-page>
  <app-auth-form-card
    title="Portal unavailable"
    subtitle="Your account does not include access to this web workspace."
    [showTrustFooter]="false"
  >
    <app-error-state
      title="Builder and Platform access only"
      [description]="message"
      actionLabel="Back to home"
      (action)="goToPublicHome()"
    />
    <div class="auth-secondary-actions">
      <app-ghost-button label="Sign out" icon="pi pi-sign-out" (clicked)="signOut()" />
    </div>
  </app-auth-form-card>
</app-auth-page>
