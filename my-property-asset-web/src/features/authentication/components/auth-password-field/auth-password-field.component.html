<div class="auth-password-field">
  <label class="auth-password-field__label" [for]="inputId()">{{ label() }}</label>

  <div class="auth-password-field__input">
    <app-input-text
      [inputId]="inputId()"
      [name]="inputId()"
      [type]="visible() ? 'text' : 'password'"
      [placeholder]="placeholder()"
      [invalid]="showError()"
      [value]="control().value"
      [autocomplete]="autocomplete()"
      (valueChange)="control().setValue($event)"
      (valueChange)="control().markAsTouched()"
    />

    <app-button
      class="auth-password-field__toggle"
      [icon]="visible() ? 'eye-slash' : 'eye'"
      [text]="true"
      [rounded]="true"
      [ariaLabel]="visible() ? 'Hide password' : 'Show password'"
      (clicked)="toggleVisibility()"
    />
  </div>

  @if (showError()) {
    <p class="auth-password-field__error" role="alert">{{ errorMessage() }}</p>
  }
</div>
