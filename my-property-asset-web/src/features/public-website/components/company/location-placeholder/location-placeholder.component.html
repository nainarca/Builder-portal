<div class="location-placeholder" role="img" [attr.aria-label]="label()">

  <div class="location-placeholder__pin" aria-hidden="true">
    <i class="pi pi-map-marker"></i>
  </div>
  <p class="location-placeholder__label">{{ label() }}</p>
</div>
