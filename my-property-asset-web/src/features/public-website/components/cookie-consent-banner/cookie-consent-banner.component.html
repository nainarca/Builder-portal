@if (visible()) {
  <section class="cookie-consent" role="dialog" aria-labelledby="cookie-consent-title" aria-live="polite">
    <div class="cookie-consent__content">
      <h2 id="cookie-consent-title" class="cookie-consent__title">Cookie preferences</h2>
      <p class="cookie-consent__description">
        We use cookies to understand how the public website is used and to improve your experience.
        Analytics hooks are framework-only until you accept.
      </p>
    </div>
    <div class="cookie-consent__actions">
      <app-button label="Decline" [outlined]="true" severity="secondary" (clicked)="decline()" />
      <app-button label="Accept" (clicked)="accept()" />
    </div>
  </section>
}
