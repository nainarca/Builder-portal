<header
  class="public-header layout-header layout-surface"
  [class.public-header--scrolled]="scrolled()"
  role="banner"
>
  <div class="public-header__inner flex align-items-center justify-content-between px-4 gap-3">
    <div class="public-header__brand-group flex align-items-center gap-3">
      <button
        type="button"
        class="public-header__menu-button mpa-focus-visible"
        aria-label="Open navigation menu"
        [attr.aria-expanded]="mobileMenuOpen()"
        (click)="toggleMobileNavigation()"
      >
        <i class="pi pi-bars" aria-hidden="true"></i>
      </button>

      <a routerLink="/" class="public-header__brand mpa-focus-visible" aria-label="MyPropertyAsset home">
        <img
          class="public-header__logo"
          [src]="logoSrc()"
          [alt]="brand.logo?.alt ?? brand.name"
          width="160"
          height="40"
        />
      </a>
    </div>

    <div class="public-header__navigation flex align-items-center gap-3 flex-1 justify-content-end">
      <app-top-navigation />
      <button
        type="button"
        class="public-header__theme-toggle mpa-focus-visible"
        [attr.aria-label]="'Theme: ' + themeModeLabel()"
        (click)="cycleThemeMode()"
      >
        <i class="pi pi-sun" aria-hidden="true"></i>
        <span class="public-header__theme-label">{{ themeModeLabel() }}</span>
      </button>
      <app-conversion-cta-link
        label="Sign In"
        route="/auth/login"
        intent="signin"
        analyticsName="public_header_signin"
        [outlined]="true"
        severity="secondary"
      />
      <app-conversion-cta-link
        class="public-header__cta-primary"
        label="Request Demo"
        route="/get-started"
        analyticsName="public_header_request_demo"
      />
    </div>
  </div>

  @if (mobileMenuOpen()) {
    <div class="public-header__mobile-panel" role="dialog" aria-label="Mobile navigation">
      <app-top-navigation />
      <app-conversion-cta-link
        class="public-header__mobile-sign-in"
        label="Sign In"
        route="/auth/login"
        intent="signin"
        analyticsName="public_header_mobile_signin"
        [outlined]="true"
        severity="secondary"
      />
      <app-conversion-cta-link
        class="public-header__mobile-sign-in"
        label="Request Demo"
        route="/get-started"
        analyticsName="public_header_mobile_request_demo"
      />
    </div>
  }
</header>
