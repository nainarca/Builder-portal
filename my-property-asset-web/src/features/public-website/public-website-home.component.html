<main class="public-home">
  <app-public-hero-section
    [eyebrow]="hero.eyebrow"
    [title]="hero.title"
    [subtitle]="hero.subtitle"
    [highlights]="hero.highlights"
    [primaryCta]="hero.primaryCta"
    [secondaryCta]="hero.secondaryCta"
    [logoSrc]="logoSrc()"
    [logoAlt]="brand.name"
  />

  <app-public-trusted-by-section
    [sectionId]="sectionIds.trustedBy"
    [logos]="trustedLogos"
  />

  <hr class="public-section-divider" aria-hidden="true" />

  <app-public-features-section
    [sectionId]="sectionIds.features"
    title="The platform property enterprises run on"
    [description]="brand.description"
    [features]="features"
  />

  <app-public-benefits-section
    [sectionId]="sectionIds.benefits"
    title="Purpose-built for every stakeholder in your ecosystem"
    description="Whether you develop, own, manage, or invest — MyPropertyAsset delivers the clarity and control your role demands."
    [benefits]="audienceBenefits"
  />

  <app-public-how-it-works-section
    [sectionId]="sectionIds.howItWorks"
    title="From first conversation to full portfolio scale"
    description="A proven path to enterprise-ready property operations — without rebuilding your technology stack."
    [steps]="steps"
  />

  <app-public-statistics-section
    [sectionId]="sectionIds.statistics"
    title="Impact you can measure"
    [statistics]="statistics"
  />

  <app-public-testimonials-section
    [sectionId]="sectionIds.testimonials"
    title="Trusted by teams who raise the bar"
    [testimonials]="testimonials"
  />

  <app-public-cta-section
    [title]="finalCta.title"
    [description]="finalCta.description"
    [primaryCta]="finalCta.primaryCta"
    [secondaryCta]="finalCta.secondaryCta"
    [trustBadges]="trustBadges"
  />
</main>
