@if (document(); as doc) {
  <main class="legal-document-page">
    <div class="public-section__container">
      <nav class="legal-document-page__breadcrumb" aria-label="Breadcrumb">
        <a routerLink="/legal">Legal</a>
        <span aria-hidden="true">/</span>
        <span aria-current="page">{{ doc.title }}</span>
      </nav>

      <app-legal-document-layout
        [title]="doc.title"
        [description]="doc.description"
        [lastUpdated]="doc.lastUpdated"
        [sections]="doc.sections"
      />
    </div>
  </main>
} @else {
  <main class="legal-document-page legal-document-page--not-found">
    <div class="public-section__container">
      <h1>Document not found</h1>
      <p>The legal document you are looking for does not exist.</p>
      <a routerLink="/legal">Return to Legal hub</a>
    </div>
  </main>
}
