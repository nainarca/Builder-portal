<app-bp-page>
  @if (handover(); as h) {
    <div class="handover-page handover-page--detail">
      <app-enterprise-detail-shell
        pattern="stage"
        [stageSteps]="stageSteps()"
        [activeStageId]="activeStageId()"
        stageAriaLabel="Handover stages"
        (stageSelect)="onStageSelect($event)"
      >
        <app-enterprise-entity-hero
          detailHero
          [eyebrow]="h.projectName + ' · ' + h.towerName"
          [title]="'Handover — ' + h.unitNumber"
          [subtitle]="h.ownerName"
          [identifier]="h.id"
          [statusLabel]="statusLabel()"
          [statusSeverity]="statusSeverity()"
          [statusIcon]="statusIcon()"
          [facts]="heroFacts()"
          [stats]="heroStats()"
          [overflowActions]="overflowActions()"
          (overflowAction)="onOverflowAction($event)"
        >
          <span entityHeroLeading class="handover-icon handover-icon--lg">
            <i class="pi pi-flag" aria-hidden="true"></i>
          </span>
        </app-enterprise-entity-hero>

        <div detailMain>
          <app-handover-overview [handover]="h" />
          <app-workflow-card title="Workflow timeline">
            <app-workflow-timeline [stages]="h.stages" />
          </app-workflow-card>
          <app-timeline-card title="Audit timeline" [items]="h.activity" />
        </div>

        <aside detailAside>
          <app-progress-card [percent]="h.overallProgress" [delayed]="h.overallStatus === 'delayed'" />
          @if (readiness(); as r) {
            <app-readiness-card [readiness]="r" />
          }
          @if (invitation(); as invitation) {
            <app-enterprise-metadata-grid
              title="Invitation"
              [items]="[
                { label: 'Status', value: invitation.status },
                { label: 'Expires', value: invitation.expiresAt ?? '—' },
              ]"
            />
          }
          @if (activationReadiness(); as activation) {
            <app-enterprise-metadata-grid
              title="Activation readiness"
              [items]="[
                { label: 'Checklist', value: activation.checklistComplete ? 'Ready' : 'Pending' },
                { label: 'Invitation', value: activation.invitationAccepted ? 'Accepted' : 'Pending' },
                { label: 'Activated', value: activation.activated ? 'Yes' : 'No' },
              ]"
            />
          }
          <app-document-summary-panel [unitId]="h.unitId" />
          <app-enterprise-detail-action-panel
            title="Stage workspaces"
            [actions]="stageWorkspaceActions()"
            (actionClick)="onOverflowAction($event)"
          />
        </aside>
      </app-enterprise-detail-shell>
    </div>
  } @else {
    <app-empty-no-data
      title="Handover not found"
      description="The requested handover does not exist."
    />
  }
</app-bp-page>
