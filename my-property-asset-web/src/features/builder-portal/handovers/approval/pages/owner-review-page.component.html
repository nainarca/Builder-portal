<app-bp-page>
  @if (handover(); as h) {
    @if (approval(); as a) {
      <div class="handover-page">
        <header class="handover-header">
          <div class="handover-header__main">
            <span class="handover-icon handover-icon--lg"><i class="pi pi-eye" aria-hidden="true"></i></span>
            <div>
              <span class="mpa-eyebrow">{{ h.projectName }} · {{ h.towerName }}</span>
              <h1 class="ui-page-title">Owner review — {{ h.unitNumber }}</h1>
              <p class="ui-page-subtitle">{{ h.ownerName }}</p>
              <div class="handover-header__badges">
                <app-approval-status-badge [status]="a.status" />
              </div>
            </div>
          </div>
          <div class="handover-header__actions">
            <app-button label="Back to approval" [text]="true" (clicked)="backToApproval()" />
          </div>
        </header>

        <app-approval-card [handover]="h" [approval]="a" />

        <app-owner-review-summary [handover]="h" />

        <app-terms-acceptance-panel [alreadyAccepted]="a.termsAccepted" [acceptedAt]="a.ownerReviewedAt" (accept)="onAccept()" />
      </div>
    } @else {
      <app-approval-empty-state />
    }
  } @else {
    <app-empty-no-data
      title="Handover not found"
      description="The requested handover does not exist."
    />
  }
</app-bp-page>
