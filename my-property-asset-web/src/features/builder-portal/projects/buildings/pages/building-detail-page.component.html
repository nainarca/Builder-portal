<app-bp-page>
  @if (building(); as b) {
    <div class="bldg-page bldg-page--detail">
      <app-enterprise-detail-shell pattern="simple" [showAside]="false">
        <div detailHero>
          <app-bldg-header [building]="b" [projectName]="project()?.name ?? 'Project'">
            @if (!b.archived) {
              <app-button
                label="Archive"
                icon="pi pi-archive"
                severity="danger"
                [outlined]="true"
                (clicked)="onArchive()"
              />
            } @else {
              <app-button label="Restore" icon="pi pi-replay" (clicked)="onRestore()" />
            }
          </app-bldg-header>
        </div>

        <div detailMain>
          <app-enterprise-metadata-grid
            title="Building overview"
            [items]="[
              { label: 'Description', value: b.description || '—' },
              { label: 'Tower', value: b.towerName || '—' },
              { label: 'Block', value: b.blockName || '—' },
              { label: 'Address', value: b.addressLine || '—' },
              { label: 'Floors', value: '' + b.floorsCount },
              { label: 'Units (planned)', value: '' + b.unitsCount },
              { label: 'Display order', value: '' + b.displayOrder },
              { label: 'Image', value: b.imageUrl || '—' },
            ]"
          >
            <div class="bldg-overview__stats" style="margin-bottom: var(--mpa-spacing-md)">
              <article>
                <p class="bldg-overview__label">Status</p>
                <app-bldg-status-badge [status]="b.status" />
              </article>
            </div>
          </app-enterprise-metadata-grid>
        </div>
      </app-enterprise-detail-shell>
    </div>
  } @else {
    <app-empty-no-data
      title="Building not found"
      description="The requested building does not exist or belongs to another project."
    />
  }
</app-bp-page>
