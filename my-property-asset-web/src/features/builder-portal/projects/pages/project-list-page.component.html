<app-bp-page>
  <div class="proj-page">
    <!-- One primary action in header (UI-REBIRTH §6 / §20 #5). Import & filters → overflow. -->
    <app-enterprise-list-page-header
      eyebrow="Builder Portal"
      title="Projects"
      description="Search, filter, and manage every development in your portfolio."
    >
      <app-authorized-button
        listHeaderActions
        label="Create project"
        icon="plus"
        permission="id-07-project-unit:contribute"
        (clicked)="createProject()"
      />
    </app-enterprise-list-page-header>

    <app-enterprise-data-table-shell
      [state]="listState.loading() ? 'loading' : 'idle'"
      [searchValue]="listState.search()"
      searchPlaceholder="Search projects…"
      tableAriaLabel="Projects table"
      [quickFilters]="statusQuickFilters()"
      [showSavedSearches]="true"
      [savedSearches]="savedSearchOptions()"
      [sortOptions]="sortOptions"
      [sortValue]="listState.sortValue()"
      [columns]="tableColumns()"
      [viewMode]="listState.viewMode()"
      [showViewToggle]="true"
      [exportLoading]="listState.exportLoading()"
      [advancedFiltersOpen]="listState.showAdvancedFilters()"
      [selectedCount]="listState.selectedIds().length"
      [totalCount]="listState.listResult().total"
      [bulkActions]="bulkActions"
      [secondaryActions]="secondaryActions"
      [filterChips]="filterChips()"
      [resultSummary]="resultSummary()"
      [showPagination]="false"
      (searchChange)="onSearch($event)"
      (quickFilterToggle)="onStatusFilter($event)"
      (savedSearchSelect)="onSavedView($event)"
      (sortChange)="onSort($event)"
      (viewModeChange)="onViewModeChange($event)"
      (columnsChange)="onColumnsChange($event)"
      (exportClick)="exportAll()"
      (secondaryAction)="onSecondaryAction($event)"
      (filterChipRemove)="onFilterChipRemove($event)"
      (clearFilters)="onClearFilters()"
      (clearSelection)="listState.clearSelection()"
      (bulkAction)="onBulkActionId($event)"
    >
      <app-proj-advanced-filters
        advancedFilters
        [typeFilter]="listState.typeFilter()"
        [cityFilter]="listState.cityFilter()"
        [includeArchived]="listState.includeArchived()"
        [cities]="listState.cities()"
        (typeFilterChange)="listState.setTypeFilter($event)"
        (cityFilterChange)="listState.setCityFilter($event)"
        (includeArchivedChange)="listState.setIncludeArchived($event)"
        (filtersReset)="listState.resetFilters()"
      />

      @if (listState.viewMode() === 'table') {
        <app-proj-data-grid
          tableBody
          [items]="listState.listResult().items"
          [loading]="listState.loading()"
          [total]="listState.listResult().total"
          [pageSize]="listState.pageSize()"
          [visibleColumns]="listState.visibleColumns()"
          (selectionChange)="onSelectionChange($event)"
        />
      } @else {
        <div cardView>
          <app-proj-card-grid
            [items]="listState.listResult().items"
            [favoriteIds]="listState.favoriteIds()"
            (favoriteToggle)="listState.toggleFavorite($event)"
          />
          <app-pagination-wrapper
            [rows]="listState.pageSize()"
            [totalRecords]="listState.listResult().total"
            [first]="(listState.page() - 1) * listState.pageSize()"
            (pageChange)="onCardPageChange($event)"
          />
        </div>
      }
    </app-enterprise-data-table-shell>

    <app-dialog-shell
      title="Import projects"
      [visible]="listState.importDialogVisible()"
      width="28rem"
      (visibleChange)="onImportDialogVisible($event)"
    >
      <p class="mpa-body-md m-0">CSV import framework — no backend connected.</p>
      <div dialogActions>
        <app-outline-button label="Close" (clicked)="listState.closeImportDialog()" />
      </div>
    </app-dialog-shell>
  </div>
</app-bp-page>
