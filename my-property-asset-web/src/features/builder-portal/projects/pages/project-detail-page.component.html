<app-bp-page>
  @if (project(); as proj) {
    <div class="proj-page proj-page--detail">
      <app-proj-header [project]="proj">
        @if (!proj.archived) {
          <app-button
            label="Archive"
            icon="pi pi-archive"
            severity="danger"
            [outlined]="true"
            (clicked)="onArchive()"
          />
        } @else {
          <app-button label="Restore" icon="pi pi-replay" (clicked)="onRestore()" />
        }
      </app-proj-header>

      @if (showBuildings()) {
        <section class="proj-buildings-card" aria-label="Buildings summary">
          <div>
            <h2 class="mpa-heading-sm m-0">Buildings</h2>
            <p class="mpa-body-md m-0">
              {{ buildingStats().total }} active
              @if (buildingsRequired()) {
                · Required for this project type
              } @else {
                · Optional for this project type
              }
            </p>
          </div>
          <app-button label="Manage buildings" icon="pi pi-building" (clicked)="goToBuildings()" />
        </section>
      }

      <div class="proj-detail-layout">
        <div class="proj-detail-layout__main">
          <app-proj-overview [project]="proj" />
          <app-proj-location-card [location]="proj.location" />
          <app-proj-summary-row [summary]="proj.summary" [projectId]="proj.id" />
        </div>
        <aside class="proj-detail-layout__aside">
          <app-proj-map-placeholder />
          <app-proj-gallery-placeholder />
        </aside>
      </div>
    </div>
  } @else {
    <app-empty-no-data title="Project not found" description="The requested project does not exist or was removed."
    />
  }
</app-bp-page>
