@if (formState.model(); as model) {
  <app-enterprise-form-layout [width]="layoutMode() === 'wizard' ? 'default' : 'wide'">
    @if (formState.lastAutosavedAt()) {
      <app-enterprise-helper-text
        text="Draft autosaved"
        icon="pi pi-save"
        tone="info"
      />
    }

    @if (layoutMode() === 'wizard') {
      <app-enterprise-step-indicator
        [steps]="steps"
        [activeIndex]="activeIndex()"
        (next)="nextStep()"
        (back)="backStep()"
        (stepChange)="goToStep($event)"
      >
        @switch (activeIndex()) {
          @case (0) {
            <app-enterprise-form-section
              kind="general"
              title="Basics"
              description="Core project identity"
              [collapsible]="false"
              [columns]="1"
            >
              <ng-container *ngTemplateOutlet="basicsFields; context: { model }" />
            </app-enterprise-form-section>
          }
          @case (1) {
            <app-enterprise-form-section
              kind="address"
              title="Location & timeline"
              [collapsible]="false"
              [columns]="1"
            >
              <ng-container *ngTemplateOutlet="locationFields; context: { model }" />
            </app-enterprise-form-section>
          }
          @case (2) {
            <app-enterprise-form-section
              kind="configuration"
              title="Status & media"
              [collapsible]="false"
              [columns]="1"
            >
              <ng-container *ngTemplateOutlet="statusFields; context: { model }" />
            </app-enterprise-form-section>
          }
          @case (3) {
            <app-enterprise-review-summary
              title="Confirm details"
              description="This is what you’re about to create."
              [previewTitle]="model.name || 'Untitled project'"
              [previewSubtitle]="model.city ? model.city + (model.state ? ', ' + model.state : '') : 'Location pending'"
              [previewEyebrow]="model.code || 'New project'"
              previewIcon="pi pi-building"
              [statusLabel]="model.status"
              [facts]="reviewFacts(model)"
            />
          }
        }

        <div finalStepActions>
          <app-primary-button label="Create project" icon="pi pi-check" (clicked)="submit()" />
        </div>
      </app-enterprise-step-indicator>
    } @else {
      <!-- Edit = single-page grouped form (UI-REBIRTH §7) -->
      <app-enterprise-form-section kind="general" title="Basics" description="Core project identity" [columns]="1">
        <ng-container *ngTemplateOutlet="basicsFields; context: { model }" />
      </app-enterprise-form-section>
      <app-enterprise-form-section kind="address" title="Location & timeline" [columns]="1">
        <ng-container *ngTemplateOutlet="locationFields; context: { model }" />
      </app-enterprise-form-section>
      <app-enterprise-form-section kind="configuration" title="Status & media" [columns]="1">
        <ng-container *ngTemplateOutlet="statusFields; context: { model }" />
      </app-enterprise-form-section>
    }
  </app-enterprise-form-layout>
}

<ng-template #basicsFields let-model="model">
  <app-enterprise-text-input
    label="Project name"
    [required]="true"
    [value]="model.name"
    [error]="formState.errors()['name']"
    (valueChange)="onTextChange('name', $event)"
  />
  <app-enterprise-text-input
    label="Project code"
    [value]="model.code"
    hint="Optional short code shown in lists and headers."
    (valueChange)="onTextChange('code', $event)"
  />
  <app-enterprise-select-input
    label="Project type"
    [required]="true"
    [options]="typeOptions"
    [value]="model.projectType"
    (valueChange)="onTextChange('projectType', $event)"
  />
  <app-enterprise-select-input
    label="Hierarchy"
    [required]="true"
    [options]="hierarchyOptionsFor(model.projectType)"
    [value]="model.hierarchy"
    [error]="formState.errors()['hierarchy']"
    hint="Building based shows Buildings then Units. Direct units skips Buildings."
    (valueChange)="onTextChange('hierarchy', $event)"
  />
    <app-enterprise-textarea-input
      label="Description"
      [value]="model.description"
      [rows]="3"
      [maxLength]="500"
      (valueChange)="onTextChange('description', $event)"
    />
</ng-template>

<ng-template #locationFields let-model="model">
  <app-enterprise-text-input
    label="Address"
    [value]="model.addressLine"
    (valueChange)="onTextChange('addressLine', $event)"
  />
  <div class="proj-form__paired">
    <app-enterprise-text-input
      label="City"
      [required]="true"
      [value]="model.city"
      [error]="formState.errors()['city']"
      (valueChange)="onTextChange('city', $event)"
    />
    <app-enterprise-text-input
      label="State"
      [value]="model.state"
      (valueChange)="onTextChange('state', $event)"
    />
  </div>
  <app-enterprise-text-input
    label="Pincode"
    [value]="model.postalCode"
    (valueChange)="onTextChange('postalCode', $event)"
  />
  <div class="proj-form__paired">
    <app-enterprise-text-input
      label="Latitude"
      [value]="model.latitude"
      [error]="formState.errors()['latitude']"
      (valueChange)="onTextChange('latitude', $event)"
    />
    <app-enterprise-text-input
      label="Longitude"
      [value]="model.longitude"
      [error]="formState.errors()['longitude']"
      (valueChange)="onTextChange('longitude', $event)"
    />
  </div>
  <app-enterprise-date-input
    label="Launch date"
    [value]="model.launchDate"
    (valueChange)="onTextChange('launchDate', $event ?? '')"
  />
  <app-enterprise-date-input
    label="Expected completion"
    [value]="model.expectedCompletionDate"
    [error]="formState.errors()['expectedCompletionDate']"
    (valueChange)="onTextChange('expectedCompletionDate', $event ?? '')"
  />
</ng-template>

<ng-template #statusFields let-model="model">
  <app-enterprise-select-input
    label="Status"
    [options]="statusOptions"
    [value]="model.status"
    (valueChange)="onTextChange('status', $event)"
  />
  <app-enterprise-text-input
    label="Banner URL"
    [value]="model.bannerUrl"
    (valueChange)="onTextChange('bannerUrl', $event)"
  />
  <app-enterprise-text-input
    label="Logo URL"
    [value]="model.logoUrl"
    (valueChange)="onTextChange('logoUrl', $event)"
  />
</ng-template>
