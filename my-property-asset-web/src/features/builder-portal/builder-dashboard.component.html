<app-bp-page>
  <div class="bp-dashboard">
    <app-enterprise-dashboard-shell
      rhythm="operational"
      [title]="header.title"
      [description]="header.description"
      [eyebrow]="header.eyebrow"
      [state]="refreshingAll() ? 'refreshing' : 'idle'"
      [showToolbar]="true"
      [showFooter]="!!lastRefreshedLabel()"
      (refresh)="onRefreshAll()"
    >
      <div toolbarStart class="bp-dashboard__filters" role="group" aria-label="Dashboard time range">
        @for (option of filters; track option.id) {
          <app-outline-button
            size="small"
            [label]="option.label"
            (clicked)="onFilterChange(option.value)"
          />
        }
      </div>

      <app-bp-welcome
        dashboardWelcome
        [greeting]="greeting()"
        [name]="displayName()"
        [organizationName]="organizationName()"
        [today]="today()"
      />

      <app-enterprise-dashboard-account-health
        dashboardAccountHealth
        [health]="accountHealth()"
      />

      <!-- Zone 1: KPI strip (3–5) -->
      <app-enterprise-dashboard-kpi-strip kpiStrip>
        @for (kpi of kpis(); track kpi.id) {
          <app-enterprise-kpi-primary
            [label]="kpi.label"
            [value]="kpi.value"
            [hint]="kpi.hint"
            [trend]="kpi.trend"
            [trendLabel]="kpi.trendLabel"
          />
        }
      </app-enterprise-dashboard-kpi-strip>

      <!-- Zone 2: Attention -->
      <app-enterprise-dashboard-attention-list
        attentionZone
        title="Needs attention today"
        description="Operational items that need a decision or follow-up."
        [items]="attentionItems()"
        (action)="onAttentionAction($event)"
      />

      <!-- Zone 3: Activity + portfolio -->
      <div activityZone class="bp-dashboard__activity">
        <app-enterprise-dashboard-grid ariaLabel="Portfolio and activity">
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-bp-recent-activity-widget
              [items]="activities"
              [loading]="isLoading('recent-activity')"
              (refresh)="onRefreshWidget('recent-activity')"
            />
          </app-enterprise-dashboard-grid-item>
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-bp-recent-projects-widget
              [items]="recentProjects()"
              [loading]="isLoading('recent-projects')"
              (refresh)="onRefreshWidget('recent-projects')"
            />
          </app-enterprise-dashboard-grid-item>
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-bp-project-status-overview-widget
              [chart]="statusChart()"
              [loading]="isLoading('project-status-overview')"
              (refresh)="onRefreshWidget('project-status-overview')"
            />
          </app-enterprise-dashboard-grid-item>
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-bp-project-progress-widget
              [items]="recentProjects()"
              [loading]="isLoading('project-progress')"
              (refresh)="onRefreshWidget('project-progress')"
            />
          </app-enterprise-dashboard-grid-item>
        </app-enterprise-dashboard-grid>
      </div>

      <!-- Zone 4: Quick actions -->
      <div quickActions>
        <app-bp-quick-actions-widget
          [actions]="quickActions"
          [pinnedIds]="pinnedActionIds()"
          [favoriteIds]="favoriteActionIds()"
          (actionSelected)="onQuickActionSelected($event)"
        />
      </div>

      @if (lastRefreshedLabel(); as refreshed) {
        <span dashboardFooter>Last refreshed {{ refreshed }}</span>
      }
    </app-enterprise-dashboard-shell>
  </div>
</app-bp-page>
