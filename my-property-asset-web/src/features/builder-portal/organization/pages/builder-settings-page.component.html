<app-bp-page>
  <section class="builder-settings-page">
    <app-enterprise-form-page-header
      eyebrow="Settings"
      title="Organization settings"
      subtitle="Manage company profile and invitation status for your Builder Organization."
      mode="view"
    />

    <div class="builder-settings-page__grid">
      <app-enterprise-settings-section
        title="Company"
        description="Legal name and company profile for your builder organization."
        icon="pi pi-building"
        headingId="builder-settings-company"
      >
        <p>{{ company()?.legalName ?? organizationName() ?? 'Your builder organization' }}</p>
        <a routerLink="/builder-portal/company">Edit company profile</a>
      </app-enterprise-settings-section>

      <app-enterprise-settings-section
        title="Organization"
        description="Current organization identifier and status."
        icon="pi pi-sitemap"
        headingId="builder-settings-organization"
      >
        <p>ID: {{ organizationId() ?? 'Not resolved' }}</p>
        <p>Status: {{ company()?.status ?? 'unknown' }}</p>
      </app-enterprise-settings-section>

      <app-enterprise-settings-section
        title="Branding"
        description="Manage logos, theme tokens, Owner App contract payload, and branding health warnings."
        icon="pi pi-palette"
        headingId="builder-settings-branding"
      >
        <a routerLink="/builder-portal/branding">Open branding workspace</a>
      </app-enterprise-settings-section>

      <app-enterprise-settings-section
        title="Invitations"
        description="Accept a builder owner invitation after Super Admin provisions your company."
        icon="pi pi-envelope"
        headingId="builder-settings-invitations"
      >
        <a routerLink="/builder-portal/invitation">Open invitation workspace</a>
      </app-enterprise-settings-section>
    </div>
  </section>
</app-bp-page>
