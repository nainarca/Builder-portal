<app-base-page>
  <div class="owner-page">
    <app-page-header
      [eyebrow]="header.eyebrow"
      [title]="header.title"
      [description]="header.description"
    >
      <app-button pageActions label="Assign owner" icon="pi pi-plus" (clicked)="goToAssign()" />
    </app-page-header>

    <section class="owner-quick-stats" aria-label="Owner quick statistics">
      @for (kpi of kpis(); track kpi.id) {
        <app-bp-kpi-card [item]="kpi" />
      }
    </section>

    <div class="owner-overview__grid">
      <div class="owner-info-panel">
        <h3 class="owner-info-panel__title">Assignment summary</h3>
        <app-assignment-summary-widget [rows]="assignmentStatusSummary()" />
      </div>
      <div class="owner-info-panel">
        <h3 class="owner-info-panel__title">Invitation summary</h3>
        <app-bp-chart-wrapper [config]="invitationStatusChart()" />
      </div>
    </div>

    <div class="owner-info-panel">
      <h3 class="owner-info-panel__title">Recent assignments</h3>
      <app-recent-assignments-widget [assignments]="recentAssignments()" />
    </div>

    <app-owner-bulk-actions
      [count]="listState.selectedIds().length"
      (action)="onBulkAction($event)"
      (clear)="listState.clearSelection()"
    />

    <app-owner-quick-filters
      [selected]="listState.activationFilter()"
      (selectedChange)="listState.setActivationFilter($event)"
    />

    <app-table-shell [value]="tableItems()" [loading]="listState.loading()">
      <app-table-toolbar tableToolbar>
        <app-search-field
          toolbarStart
          [value]="listState.search()"
          placeholder="Search owners…"
          ariaLabel="Search owners"
          (valueChange)="onSearch($event)"
        />
        <app-owner-saved-views
          toolbarStart
          [views]="listState.savedViews()"
          [selectedId]="listState.savedViewId()"
          (viewChange)="listState.applySavedView($event)"
        />
        <app-owner-view-toggle toolbarEnd [mode]="listState.viewMode()" (modeChange)="listState.setViewMode($event)" />
        <app-sort-control
          toolbarEnd
          [options]="sortOptions"
          [value]="listState.sortValue()"
          (sortChange)="onSort($event)"
        />
        <app-export-button toolbarEnd [loading]="listState.exportLoading()" (exportClick)="exportAll()" />
        <app-button
          toolbarEnd
          [label]="listState.showAdvancedFilters() ? 'Hide filters' : 'Advanced filters'"
          icon="pi pi-filter"
          [text]="true"
          (clicked)="listState.toggleAdvancedFilters()"
        />
      </app-table-toolbar>

      @if (listState.showAdvancedFilters()) {
        <app-owner-advanced-filters
          [invitationFilter]="listState.invitationFilter()"
          [projectFilter]="listState.projectFilter()"
          [includeArchived]="listState.includeArchived()"
          [projects]="projects()"
          (invitationFilterChange)="listState.setInvitationFilter($event)"
          (projectFilterChange)="listState.setProjectFilter($event)"
          (includeArchivedChange)="listState.setIncludeArchived($event)"
          (filtersReset)="listState.resetFilters()"
        />
      }

      @if (listState.viewMode() === 'table') {
        <app-owner-column-selector
          [visibleColumns]="listState.visibleColumns()"
          (columnToggle)="listState.toggleColumn($event)"
        />

        <app-owner-data-grid
          [items]="listState.listResult().items"
          [loading]="listState.loading()"
          [total]="listState.listResult().total"
          [pageSize]="listState.pageSize()"
          [visibleColumns]="listState.visibleColumns()"
          (selectionChange)="onSelectionChange($event)"
        />
      } @else {
        <app-owner-card-grid [items]="listState.listResult().items" />
        <app-pagination-wrapper
          [rows]="listState.pageSize()"
          [totalRecords]="listState.listResult().total"
          [first]="(listState.page() - 1) * listState.pageSize()"
          (pageChange)="onCardPageChange($event)"
        />
      }
    </app-table-shell>
  </div>
</app-base-page>
