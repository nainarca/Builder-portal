<app-sa-page>
  <div class="sa-dashboard">
    <app-enterprise-dashboard-shell
      rhythm="exception"
      [title]="header.title"
      [description]="header.description"
      [eyebrow]="header.eyebrow"
      [state]="refreshingAll() ? 'refreshing' : 'idle'"
      [showToolbar]="true"
      [showFooter]="!!lastRefreshedLabel()"
      (refresh)="onRefreshAll()"
    >
      <div toolbarStart class="sa-dashboard__filters" role="group" aria-label="Dashboard time range">
        @for (option of filters; track option.id) {
          <app-outline-button
            size="small"
            [label]="option.label"
            (clicked)="onFilterChange(option.value)"
          />
        }
      </div>

      <!-- Zone 1: Platform KPIs -->
      <app-enterprise-dashboard-kpi-strip kpiStrip ariaLabel="Platform health KPIs">
        @for (kpi of kpis(); track kpi.id) {
          <app-enterprise-kpi-primary
            [label]="kpi.label"
            [value]="kpi.value"
            [hint]="kpi.hint"
            [trend]="kpi.trend"
            [trendLabel]="kpi.trendLabel"
          />
        }
      </app-enterprise-dashboard-kpi-strip>

      <!-- Zone 2: Exception-first attention -->
      <app-enterprise-dashboard-attention-list
        attentionZone
        title="Exceptions requiring intervention"
        description="Cross-organization issues that need an operator today."
        emptyTitle="Platform is clear"
        emptyDescription="No open support queues, suspended builders, or degraded services need intervention right now."
        [items]="attentionItems()"
        (action)="onAttentionAction($event)"
      />

      <!-- Zone 3: Activity + focused health -->
      <div activityZone class="sa-dashboard__activity">
        <app-enterprise-dashboard-grid ariaLabel="Platform activity and health" mode="dashboard">
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-sa-recent-activity-widget
              [items]="activities()"
              [loading]="isLoading('recent-activity')"
              (refresh)="onRefreshWidget('recent-activity')"
            />
          </app-enterprise-dashboard-grid-item>
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-sa-platform-status-widget
              [items]="statuses"
              [loading]="isLoading('platform-status')"
              (refresh)="onRefreshWidget('platform-status')"
            />
          </app-enterprise-dashboard-grid-item>
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-sa-system-health-widget
              [items]="statuses"
              [loading]="isLoading('system-health')"
              (refresh)="onRefreshWidget('system-health')"
            />
          </app-enterprise-dashboard-grid-item>
          <app-enterprise-dashboard-grid-item [config]="{ colspan: 2 }">
            <app-sa-announcements-widget [items]="announcements" />
          </app-enterprise-dashboard-grid-item>
        </app-enterprise-dashboard-grid>
      </div>

      <!-- Zone 4: Quick actions -->
      <div quickActions>
        <app-sa-quick-actions-widget
          [actions]="quickActions"
          [pinnedIds]="pinnedActionIds()"
          [favoriteIds]="favoriteActionIds()"
          (actionSelected)="onQuickActionSelected($event)"
        />
      </div>

      @if (lastRefreshedLabel(); as refreshed) {
        <span dashboardFooter>Last refreshed {{ refreshed }}</span>
      }
    </app-enterprise-dashboard-shell>
  </div>
</app-sa-page>
