<app-responsive-container
  variant="authenticated"
  [sidebarCollapsed]="sidebarCollapsed()"
  class="layout-authenticated"
>
  <app-sidebar-placeholder class="layout-authenticated__sidebar" [collapsed]="sidebarCollapsed()" />
  <div class="layout-authenticated__main">
    <app-header-placeholder [sticky]="true" />
    <app-content-wrapper>
      <app-page-container>
        <router-outlet />
      </app-page-container>
    </app-content-wrapper>
    <app-footer-placeholder />
  </div>
</app-responsive-container>
