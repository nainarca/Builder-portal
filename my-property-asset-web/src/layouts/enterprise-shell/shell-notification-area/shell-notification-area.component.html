<div class="shell-notification-area__anchor">
  <button
    type="button"
    class="shell-notification-area__trigger mpa-focus-visible"
    [attr.aria-expanded]="open()"
    aria-haspopup="dialog"
    aria-controls="shell-notification-panel"
    aria-label="Notifications"
    (click)="toggle()"
  >
    <i class="pi pi-bell" aria-hidden="true"></i>
    @if (unreadCount() > 0) {
      <span class="shell-notification-area__badge" aria-hidden="true">{{ unreadCount() }}</span>
    }
  </button>

  @if (open()) {
    <div
      class="shell-notification-area__backdrop"
      aria-hidden="true"
      (click)="close()"
    ></div>
    <div
      id="shell-notification-panel"
      class="shell-notification-area__panel"
      role="dialog"
      aria-label="Notifications"
    >
      <app-enterprise-notification-center
        [items]="[]"
        [loading]="false"
        title="Notifications"
        emptyTitle="You're all caught up"
        emptyDescription="Cross-entity events will appear here."
      />
    </div>
  }
</div>
