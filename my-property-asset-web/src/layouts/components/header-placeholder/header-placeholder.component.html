<header class="layout-header layout-surface" role="banner">
  <div class="layout-header__inner">
    <div class="layout-header__leading">
      <button
        type="button"
        class="layout-header__menu-button mpa-focus-visible"
        aria-label="Open navigation menu"
        [attr.aria-expanded]="mobileMenuOpen()"
        (click)="toggleMobileNavigation()"
      >
        <i class="pi pi-bars" aria-hidden="true"></i>
      </button>

      @if (showOrganizationSelector()) {
        <app-organization-selector variant="header" />
      } @else {
        <div class="layout-header__brand">
          <span class="layout-header__brand-mark" aria-hidden="true">{{ brandInitial() }}</span>
          <span class="layout-brand">{{ displayBrand() }}</span>
        </div>
      }
    </div>

    @if (showNavigation()) {
      @if (showGlobalSearch()) {
        <div class="layout-header__center">
          <app-shell-global-search />
        </div>
      }

      <div class="layout-header__trailing">
        @if (showNotifications()) {
          <app-shell-notification-area />
        }
        <app-top-navigation />
        <app-quick-actions />
        <app-user-navigation />
      </div>
    }
  </div>
</header>
