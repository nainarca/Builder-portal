<header class="layout-header layout-surface" role="banner">
  <div class="layout-header__inner flex align-items-center justify-content-between px-4 gap-3">
    <div class="layout-header__brand-group flex align-items-center gap-3">
      <button
        type="button"
        class="layout-header__menu-button mpa-focus-visible"
        aria-label="Open navigation menu"
        [attr.aria-expanded]="mobileMenuOpen()"
        (click)="toggleMobileNavigation()"
      >
        <i class="pi pi-bars" aria-hidden="true"></i>
      </button>

      @if (showOrganizationSelector()) {
        <app-organization-selector />
      } @else {
        <div class="layout-header__brand">
          <span class="layout-header__brand-mark" aria-hidden="true">{{ brandInitial() }}</span>
          <span class="layout-brand">{{ displayBrand() }}</span>
        </div>
      }
    </div>

    @if (showNavigation()) {
      <div
        class="layout-header__navigation flex align-items-center gap-3 flex-1 justify-content-end"
      >
        <app-top-navigation />
        <app-quick-actions />
        <app-user-navigation />
      </div>
    }
  </div>
</header>
